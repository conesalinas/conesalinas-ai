<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Timer | conesalinas.ai</title>
<meta name="description" content="A pomodoro timer that roasts you when you quit. Built with AI.">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #07080a; color: #ddd9d0; font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }
.mono { font-family: 'Courier New', monospace; }
button { cursor: pointer; font-family: 'Courier New', monospace; }
input { font-family: 'Courier New', monospace; }

.header { font-size: 13px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 32px; transition: color 0.4s; }

/* Mode tabs */
.tabs { display: flex; gap: 4px; background: #111216; border-radius: 10px; padding: 4px; margin-bottom: 40px; }
.tab { background: transparent; color: #555; border: none; border-radius: 8px; padding: 10px 20px; font-size: 13px; letter-spacing: 0.5px; transition: all 0.25s; }
.tab.active { background: #1a1b20; }

/* Timer */
.timer-wrap { position: relative; width: 280px; height: 280px; margin-bottom: 36px; }
.timer-wrap svg { transform: rotate(-90deg); }
.timer-bg { fill: none; stroke: #151517; stroke-width: 6; }
.timer-progress { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.5s linear, stroke 0.4s; }
.timer-text { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.timer-digits { font-size: 56px; font-weight: 700; letter-spacing: 4px; line-height: 1; }
.timer-status { font-size: 11px; color: #444; letter-spacing: 2px; margin-top: 8px; text-transform: uppercase; }

/* Action button */
.action-btn { border: none; border-radius: 10px; padding: 14px 48px; font-size: 15px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; transition: all 0.25s; margin-bottom: 40px; }
.action-btn.start { border: none; }
.action-btn.stop { background: transparent !important; border: 2px solid; box-shadow: none !important; }

/* Roast modal */
.roast { background: #111216; border: 1px solid #222; border-radius: 14px; padding: 28px 24px; max-width: 380px; width: 100%; text-align: center; margin-bottom: 40px; display: none; }
.roast.show { display: block; }
.roast-emoji { font-size: 28px; margin-bottom: 12px; }
.roast-text { font-size: 16px; line-height: 1.7; margin-bottom: 24px; font-style: italic; }
.roast-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.roast-resume { border: none; border-radius: 8px; padding: 10px 20px; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.roast-quit { background: transparent; color: #555; border: 1px solid #222; border-radius: 8px; padding: 10px 20px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }

.divider { width: 40px; height: 1px; background: #222; margin-bottom: 32px; }

/* Tasks */
.tasks { max-width: 420px; width: 100%; margin-bottom: 32px; }
.tasks-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.tasks-label { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; }
.reset-btn { background: transparent; color: #444; border: 1px solid #1a1a1a; border-radius: 6px; padding: 4px 12px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; transition: all 0.25s; }
.reset-btn:hover { border-color: #c0392b; color: #c0392b; }
.task-input-wrap { display: flex; gap: 8px; margin-bottom: 16px; }
.task-input { flex: 1; background: #111216; border: 1px solid #1a1a1a; border-radius: 8px; padding: 12px 16px; color: #ddd9d0; font-size: 14px; outline: none; }
.task-add { border: none; border-radius: 8px; padding: 0 18px; font-size: 18px; font-weight: 700; transition: all 0.25s; }
.task-empty { font-size: 13px; color: #333; font-style: italic; text-align: center; padding: 16px; }
.task-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 8px; border: 1px solid #151517; margin-bottom: 6px; transition: all 0.25s; }
.task-item.done { background: rgba(93,169,214,0.03); }
.task-item:not(.done) { background: #0d0e10; }
.task-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid #333; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; padding: 0; color: #07080a; font-size: 12px; font-weight: 700; }
.task-text { flex: 1; font-size: 14px; color: #999; transition: all 0.25s; }
.task-item.done .task-text { color: #444; text-decoration: line-through; }
.task-remove { background: transparent; border: none; color: #2a2a2a; font-size: 16px; padding: 0 4px; transition: color 0.2s; }
.task-remove:hover { color: #c0392b; }

/* Sessions */
.sessions { text-align: center; margin-bottom: 32px; }
.sessions-header { display: flex; justify-content: center; align-items: center; gap: 16px; margin-bottom: 12px; max-width: 300px; margin-left: auto; margin-right: auto; }
.sessions-label { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; }
.sessions-reset { background: transparent; color: #444; border: 1px solid #1a1a1a; border-radius: 6px; padding: 4px 12px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; transition: all 0.25s; display: none; }
.sessions-reset:hover { border-color: #c0392b; color: #c0392b; }
.dots { display: flex; gap: 8px; justify-content: center; }
.dot { width: 12px; height: 12px; border-radius: 3px; border: 1px solid #222; background: #151517; transition: all 0.3s; }
.dot.filled { background: currentColor; }
.sessions-count { font-size: 12px; color: #444; margin-top: 10px; }

footer { font-size: 10px; color: #222; letter-spacing: 2px; margin-top: auto; padding-top: 16px; }
</style>
</head>
<body>

<div class="header mono" id="header">CONESALINAS.AI FOCUS</div>

<div class="tabs" id="tabs">
  <button class="tab mono active" data-mode="0">Pomodoro</button>
  <button class="tab mono" data-mode="1">Short Break</button>
  <button class="tab mono" data-mode="2">Long Break</button>
</div>

<div class="timer-wrap">
  <svg width="280" height="280" viewBox="0 0 280 280">
    <circle class="timer-bg" cx="140" cy="140" r="120"/>
    <circle class="timer-progress" id="progress" cx="140" cy="140" r="120"/>
  </svg>
  <div class="timer-text">
    <div class="timer-digits mono" id="digits">25:00</div>
    <div class="timer-status mono" id="status">READY</div>
  </div>
</div>

<button class="action-btn start mono" id="actionBtn">START</button>

<div class="roast" id="roast">
  <div class="roast-emoji">😤</div>
  <p class="roast-text" id="roastText"></p>
  <div class="roast-btns">
    <button class="roast-resume mono" id="resumeBtn">Fine, I'll keep going</button>
    <button class="roast-quit mono" id="quitBtn">I'm really quitting</button>
  </div>
</div>

<div class="divider"></div>

<div class="tasks">
  <div class="tasks-header">
    <p class="tasks-label mono" id="tasksLabel">Tasks</p>
    <button class="reset-btn mono" id="resetTasksBtn" style="display:none">Reset All</button>
  </div>
  <div class="task-input-wrap">
    <input class="task-input mono" id="taskInput" type="text" placeholder="Add a task...">
    <button class="task-add" id="taskAddBtn">+</button>
  </div>
  <div id="taskList">
    <p class="task-empty">No tasks yet. Add one above.</p>
  </div>
</div>

<div class="divider"></div>

<div class="sessions">
  <div class="sessions-header">
    <p class="sessions-label mono" id="sessionsLabel">Sessions Today</p>
    <button class="sessions-reset mono" id="resetSessionsBtn">Reset</button>
  </div>
  <div class="dots" id="dots"></div>
  <p class="sessions-count mono" id="sessionsCount">No sessions yet</p>
</div>

<footer class="mono">BUILT WITH AI · CONESALINAS.AI</footer>

<script>
const MODES = [
  { label: "Pomodoro", minutes: 25, color: "#5da9d6" },
  { label: "Short Break", minutes: 5, color: "#4ecdc4" },
  { label: "Long Break", minutes: 15, color: "#a78bfa" },
];

const ROASTS = [
  "Really? That's it? My microwave runs longer than you just did.",
  "Quitting already? Your attention span just filed for bankruptcy.",
  "You lasted less time than a TikTok video. Impressive.",
  "Even my loading spinner works harder than you.",
  "Your future self is watching. And cringing.",
  "Wow. The timer barely started sweating.",
  "I've seen snooze buttons with more commitment.",
  "You're not quitting. You're just giving up with extra steps.",
  "Your goldfish called. It wants its focus back.",
  "Legend says this timer is still waiting for you to finish.",
  "The pomodoro technique requires actually doing the pomodoro.",
  "That wasn't a focus session. That was a free trial.",
  "If focus were a sport, you'd be warming the bench.",
  "Even autocorrect tries harder than that.",
  "Your LinkedIn followers would be disappointed.",
];

let mode = 0;
let secondsLeft = MODES[0].minutes * 60;
let running = false;
let sessions = 0;
let interval = null;
let roastIdx = 0;
let tasks = [];
let taskIdCounter = 0;

const circumference = 2 * Math.PI * 120;

const $ = id => document.getElementById(id);
const progress = $("progress");
const digits = $("digits");
const statusEl = $("status");
const actionBtn = $("actionBtn");
const roastEl = $("roast");
const roastText = $("roastText");
const header = $("header");
const tasksLabel = $("tasksLabel");
const sessionsLabel = $("sessionsLabel");
const taskInput = $("taskInput");

progress.style.strokeDasharray = circumference;

function updateColors() {
  const c = MODES[mode].color;
  header.style.color = c;
  tasksLabel.style.color = c;
  sessionsLabel.style.color = c;
  progress.style.stroke = c;
  document.querySelectorAll(".tab").forEach((tab, i) => {
    tab.style.color = i === mode ? c : "#555";
    tab.classList.toggle("active", i === mode);
  });
  if (!running) {
    actionBtn.style.background = c;
    actionBtn.style.color = "#07080a";
    actionBtn.style.boxShadow = `0 0 30px rgba(93,169,214,0.15)`;
    actionBtn.classList.remove("stop");
    actionBtn.classList.add("start");
  } else {
    actionBtn.style.background = "transparent";
    actionBtn.style.color = c;
    actionBtn.style.borderColor = c;
    actionBtn.style.boxShadow = "none";
    actionBtn.classList.remove("start");
    actionBtn.classList.add("stop");
  }
  $("taskAddBtn").style.background = c;
  $("taskAddBtn").style.color = "#07080a";
  $("resumeBtn").style.background = c;
  $("resumeBtn").style.color = "#07080a";
  renderDots();
}

function updateDisplay() {
  const total = MODES[mode].minutes * 60;
  const prog = 1 - secondsLeft / total;
  const offset = circumference * (1 - prog);
  progress.style.strokeDashoffset = offset;
  const m = Math.floor(secondsLeft / 60);
  const s = secondsLeft % 60;
  digits.textContent = String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
  statusEl.textContent = secondsLeft === 0 ? "DONE!" : running ? "FOCUSING..." : "READY";
  actionBtn.textContent = running ? (mode === 0 ? "GIVE UP" : "SKIP") : secondsLeft === 0 ? "RESTART" : "START";
  updateColors();
}

function startTimer() {
  if (secondsLeft === 0) secondsLeft = MODES[mode].minutes * 60;
  running = true;
  interval = setInterval(() => {
    secondsLeft--;
    if (secondsLeft <= 0) {
      secondsLeft = 0;
      clearInterval(interval);
      running = false;
      if (mode === 0) {
        sessions++;
        renderDots();
      }
    }
    updateDisplay();
  }, 1000);
  updateDisplay();
}

function stopTimer() {
  running = false;
  clearInterval(interval);
  updateDisplay();
}

function resetTimer() {
  stopTimer();
  secondsLeft = MODES[mode].minutes * 60;
  updateDisplay();
}

function showRoast() {
  const roast = ROASTS[roastIdx % ROASTS.length];
  roastIdx++;
  roastText.textContent = '"' + roast + '"';
  roastEl.classList.add("show");
  actionBtn.style.display = "none";
}

function hideRoast() {
  roastEl.classList.remove("show");
  actionBtn.style.display = "";
}

// Mode tabs
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    mode = parseInt(tab.dataset.mode);
    hideRoast();
    resetTimer();
  });
});

// Action button
actionBtn.addEventListener("click", () => {
  if (running) {
    stopTimer();
    if (mode === 0) {
      showRoast();
    } else {
      resetTimer();
    }
  } else {
    startTimer();
  }
});

// Roast buttons
$("resumeBtn").addEventListener("click", () => { hideRoast(); startTimer(); });
$("quitBtn").addEventListener("click", () => { hideRoast(); resetTimer(); });

// Tasks
function renderTasks() {
  const list = $("taskList");
  const resetBtn = $("resetTasksBtn");
  resetBtn.style.display = tasks.length > 0 ? "" : "none";
  if (tasks.length === 0) {
    list.innerHTML = '<p class="task-empty">No tasks yet. Add one above.</p>';
    return;
  }
  list.innerHTML = tasks.map(t => `
    <div class="task-item ${t.done ? 'done' : ''}" data-id="${t.id}">
      <button class="task-check" onclick="toggleTask(${t.id})" style="${t.done ? 'border-color:' + MODES[mode].color + ';background:' + MODES[mode].color : ''}">${t.done ? '✓' : ''}</button>
      <span class="task-text mono">${escapeHtml(t.text)}</span>
      <button class="task-remove" onclick="removeTask(${t.id})">×</button>
    </div>
  `).join("");
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function addTask() {
  const text = taskInput.value.trim();
  if (!text) return;
  tasks.push({ id: ++taskIdCounter, text, done: false });
  taskInput.value = "";
  renderTasks();
}

window.toggleTask = function(id) {
  tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
  renderTasks();
};

window.removeTask = function(id) {
  tasks = tasks.filter(t => t.id !== id);
  renderTasks();
};

taskInput.addEventListener("keydown", e => { if (e.key === "Enter") addTask(); });
$("taskAddBtn").addEventListener("click", addTask);
$("resetTasksBtn").addEventListener("click", () => { tasks = []; renderTasks(); });

// Sessions
function renderDots() {
  const c = MODES[mode].color;
  const total = Math.max(8, sessions);
  $("dots").innerHTML = Array.from({ length: total }).map((_, i) =>
    `<div class="dot ${i < sessions ? 'filled' : ''}" style="${i < sessions ? 'background:' + c + ';border-color:' + c : ''}"></div>`
  ).join("");
  $("sessionsCount").textContent = sessions === 0 ? "No sessions yet" : sessions + " session" + (sessions !== 1 ? "s" : "") + " completed";
  $("resetSessionsBtn").style.display = sessions > 0 ? "" : "none";
}

$("resetSessionsBtn").addEventListener("click", () => { sessions = 0; renderDots(); });

// Init
updateDisplay();
renderTasks();
renderDots();
</script>
</body>
</html>
