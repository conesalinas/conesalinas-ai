<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CONE 4x">
<meta name="theme-color" content="#0a0a0a">
<title>Full Body 4x + Longevity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0a;--sf:#141414;--bd:#222;--dm:#666;--dm2:#888;--tx:#e8e8e8;
--gr:#22c55e;--gr2:#16a34a;--am:#f59e0b;--rd:#ef4444;--bl:#3b82f6;--pr:#8b5cf6;
--fn:'JetBrains Mono','SF Mono','Fira Code',monospace}
html,body{background:var(--bg);color:var(--tx);font-family:var(--fn);min-height:100vh;overflow-x:hidden}
body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
.app{max-width:480px;margin:0 auto;padding:20px 16px}
input[type=number],input[type=text]{background:var(--bg);border:1px solid var(--bd);border-radius:6px;color:var(--tx);
font:13px var(--fn);padding:8px 10px;outline:none;width:100%;box-sizing:border-box}
input:focus{border-color:var(--gr)}
button{font-family:var(--fn);cursor:pointer;border:none;outline:none}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:14px;margin-bottom:10px}
.btn{background:var(--gr);color:#000;font-size:11px;font-weight:700;padding:8px 16px;border-radius:6px;letter-spacing:.5px;white-space:nowrap}
.btn-o{background:var(--sf);color:var(--tx);border:1px solid var(--bd);font-size:11px;font-weight:700;padding:8px 16px;border-radius:6px}
.btn-x{background:transparent;border:none;color:#555;font-size:16px;padding:2px 6px;font-family:var(--fn);line-height:1}
.lbl{font-size:10px;color:var(--dm);letter-spacing:1px;text-transform:uppercase}
.lbl-lg{font-size:12px;font-weight:700;color:var(--tx)}
.sub{font-size:9px;color:var(--dm)}
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:20px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;background:transparent;color:var(--dm);font-size:10px;padding:10px 0;text-transform:uppercase;
letter-spacing:1px;border:none;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;min-width:0}
.tab.on{color:var(--tx);font-weight:700;border-bottom-color:var(--gr)}
.day-btn{flex:1;min-width:40px;background:var(--sf);color:var(--dm);border:1px solid var(--bd);
border-radius:6px;padding:10px 2px;font-size:9px;font-weight:700;letter-spacing:.5px;transition:all .15s}
.day-btn.on{border:none}
.set-btn{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:8px 4px;transition:all .15s}
.set-btn.done{border-color:var(--gr);background:rgba(34,197,94,.15)}
.htab{flex:1;border-radius:6px;padding:10px 4px;font-size:10px;font-weight:700;letter-spacing:.5px;transition:all .15s}
.htab.on{border:none}
.spread{display:flex;justify-content:space-between;align-items:center}
.row{display:flex;gap:6px}.row8{display:flex;gap:8px}
.alert{background:#1a1a0a;border:1px solid #333300;border-radius:8px;padding:12px 14px;margin-bottom:10px;font-size:11px;color:var(--am);line-height:1.5}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const DAYS=[
{day:"MON",label:"Squat Focus",tag:"FULL BODY",color:"#22c55e",ex:[
{n:"Barbell Back Squat",s:4,r:"12-15",rest:"90s",t:"compound",tr:1},
{n:"Dumbbell Bench Press",s:3,r:"10-12",rest:"90s",t:"compound",tr:1},
{n:"Barbell Row",s:3,r:"10-12",rest:"90s",t:"compound",tr:1},
{n:"Face Pulls",s:2,r:"15",rest:"60s",t:"accessory"},
{n:"Plank",s:2,r:"45 sec",rest:"45s",t:"accessory"},
{n:"Pull-ups (finisher)",s:1,r:"Max reps",rest:"-",t:"compound",tr:1}]},
{day:"TUE",label:"Hinge Focus",tag:"FULL BODY",color:"#22c55e",ex:[
{n:"Romanian Deadlift",s:4,r:"10-12",rest:"90s",t:"compound",tr:1},
{n:"Overhead Press",s:3,r:"10-12",rest:"90s",t:"compound",tr:1},
{n:"Lat Pulldown",s:3,r:"10-12",rest:"60s",t:"compound",tr:1},
{n:"Goblet Squat",s:2,r:"12-15",rest:"60s",t:"compound",tr:1},
{n:"Cable Crunches",s:2,r:"15",rest:"45s",t:"accessory"},
{n:"Pull-ups (finisher)",s:1,r:"Max reps",rest:"-",t:"compound",tr:1}]},
{day:"WED",label:"Padel / VO2 / Zone 2",tag:"CONDITIONING",color:"#f59e0b",cardio:1,opts:[
{name:"Option A: Padel",detail:"Play your game. Best conditioning in the program. Limit to once per week to prevent injury."},
{name:"Option B: Running Intervals",detail:"Build over time. Start at 1 min run / 2 min walk x8. Progress toward 4 min run / 3 min walk x4.",
steps:["5 min easy warm-up","Work intervals at current progression level","Recovery walk between intervals","5 min cool-down"],time:"~30-37 min"},
{name:"Option C: Zone 2 Walk",detail:"45-60 min outdoor speed walk at 131-143 BPM. Use when recovering from injury or no padel/running.",
steps:["Go early to beat the heat","Watch heart rate, not pace","Stay at 131-143 BPM","Slow down if you drift above 143"],time:"45-60 min"}]},
{day:"THU",label:"Press Focus",tag:"FULL BODY",color:"#22c55e",ex:[
{n:"Barbell Bench Press",s:4,r:"10-12",rest:"90s",t:"compound",tr:1},
{n:"Goblet Squat",s:3,r:"12-15",rest:"60s",t:"compound",tr:1},
{n:"Seated Cable Row",s:3,r:"10-12",rest:"60s",t:"compound",tr:1},
{n:"Lateral Raises",s:2,r:"12-15",rest:"60s",t:"accessory"},
{n:"Hanging Leg Raises",s:2,r:"12",rest:"45s",t:"accessory"},
{n:"Pull-ups (finisher)",s:1,r:"Max reps",rest:"-",t:"compound",tr:1}]},
{day:"FRI",label:"Pull Focus",tag:"FULL BODY",color:"#22c55e",ex:[
{n:"Trap Bar Deadlift",s:4,r:"8-10",rest:"2 min",t:"compound",tr:1},
{n:"Pull-ups / Assisted",s:3,r:"6-10",rest:"90s",t:"compound",tr:1},
{n:"Leg Press",s:3,r:"10-12",rest:"60s",t:"compound",tr:1},
{n:"Dumbbell Curls",s:2,r:"12",rest:"60s",t:"accessory"},
{n:"Ab Wheel Rollout",s:2,r:"10",rest:"45s",t:"accessory"}]},
{day:"SAT",label:"Zone 2 Outdoor Walk",tag:"AEROBIC BASE",color:"#3b82f6",cardio:1,opts:[
{name:"Zone 2 Walk",detail:"60 min outdoor speed walk. HR 131-143 BPM. Go early to beat the heat.",
steps:["Hydrate 16-20 oz water before leaving","Walk at speed that keeps HR at 131-143","Slow down if above 143, speed up if below 130","Audiobook or podcast for the session"],time:"60 min"}]},
{day:"SUN",label:"Stability & Mobility",tag:"LONGEVITY",color:"#8b5cf6",stab:1,blocks:[
{name:"Soft Tissue / Foam Roll",time:"10 min",moves:["Thoracic spine","Quads & IT band","Glutes & piriformis","Calves & hamstrings"]},
{name:"Hip Mobility Flow",time:"10 min",moves:["90/90 switches x10 each side","Hip CARs x5 each direction","Deep squat hold \u2014 60 sec cumulative","Couch stretch \u2014 45 sec each side"]},
{name:"Shoulder Stability",time:"8 min",moves:["Band pull-aparts x15","Turkish get-up (light KB) x3 each side","Dead hangs \u2014 30 sec x3"]},
{name:"Balance & Core",time:"7 min",moves:["Single leg RDL (bodyweight) x8 each","Pallof press x10 each side","Bird dogs x10 each side"]},
{name:"Sauna or Stretch Close-out",time:"15-20 min",moves:["Sauna if at gym, or full stretch routine at home"]}]}
];

const RULES=[
{i:"\u23F1",t:"Session Structure",d:"15 min Zone 2 warm-up on incline treadmill (131+ BPM) \u2192 30 min lifting \u2192 sauna. Total ~50 min."},
{i:"\u{1F4C8}",t:"Progression",d:"Hit top of rep range for all sets \u2192 add 5 lb upper / 10 lb lower next session."},
{i:"\u{1FAC1}",t:"Effort Level (RIR)",d:"Compounds: 1-2 RIR on last set. Accessories: 0-1 RIR (near failure). If you can do 3+ more reps, add weight."},
{i:"\u{1F4AA}",t:"Pull-up Finisher",d:"One max-effort set at the end of every lifting day. Greasing the groove builds volume over time."},
{i:"\u2668\uFE0F",t:"Sauna",d:"15-20 min post-workout. Recovery + cardiovascular benefit."},
{i:"\u{1F6B6}",t:"Daily Steps",d:"Walking pad 8-12k/day at comfortable pace. This is Zone 1, not Zone 2."},
{i:"\u{1F504}",t:"Program Changes",d:"Run 8-12 weeks. Only swap a lift if you stall 2-3 weeks on it."},
{i:"\u{1F9D8}",t:"Evening Stretches",d:"Every night: toe touch hold 30s, couch stretch 30s each side, 90/90 switches x5 each. 5 min total."}
];

const NUTR=[
{i:"\u{1F4CA}",r:"1,800 calories daily. Track everything in Cronometer."},
{i:"\u{1F4AA}",r:"140g protein minimum. This is the floor, not the ceiling."},
{i:"\u{1F9C0}",r:"Watch the cheese. 1 oz = 110 cal, 9g fat. Measure it."},
{i:"\u{1F957}",r:"Eat veggies first, protein second, carbs last."}
];

const LONG=[
{p:"Strength",rx:"4x/week full body",s:"\u2713",c:"#22c55e"},
{p:"VO2 Max",rx:"Padel + running intervals",s:"\u2713",c:"#22c55e"},
{p:"Zone 2",rx:"Saturday walk + gym warm-ups",s:"\u2713",c:"#22c55e"},
{p:"Stability",rx:"Sunday session + nightly stretches",s:"\u2713",c:"#22c55e"},
{p:"Sleep",rx:"7-8 hrs / 90+ score",s:"\u2713",c:"#22c55e"}
];

// Helpers
const $=s=>document.querySelector(s);
const td=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
const autoDay=()=>[6,0,1,2,3,4,5][new Date().getDay()];
const wkNum=ds=>{const d=new Date(ds+'T00:00:00'),j=new Date(d.getFullYear(),0,1);return Math.ceil(((d-j)/864e5+j.getDay()+1)/7)};
const wkLbl=ds=>`Week ${wkNum(ds)}, ${ds.substring(0,4)}`;
const uid=()=>Date.now()+Math.random().toString(36).substr(2,5);

const LS={
  get(k,fb){try{const v=localStorage.getItem('c4x-'+k);return v?JSON.parse(v):fb}catch{return fb}},
  set(k,v){try{localStorage.setItem('c4x-'+k,JSON.stringify(v))}catch(e){console.error(e)}}
};

let state={
  tab:'today',activeDay:autoDay(),checked:{},
  lifts:LS.get('l',[]),
  expWk:null
};

const save=()=>{LS.set('l',state.lifts)};
const lastLift=name=>{const e=state.lifts.filter(x=>x.n===name);return e.length?e[e.length-1]:null};

function render(){
  const day=DAYS[state.activeDay];

  let h=`
  <div style="margin-bottom:24px">
    <h1 style="font-size:22px;font-weight:700;letter-spacing:-.5px">FULL BODY 4x + LONGEVITY</h1>
    <div style="font-size:11px;color:var(--dm);margin-top:4px">Strength \u00B7 VO2 Max \u00B7 Zone 2 \u00B7 Stability \u00B7 Sleep</div>
  </div>

  <div class="tabs">
    ${['today','history','rules','nutrition','longevity'].map(t=>
      `<button class="tab${state.tab===t?' on':''}" onclick="setTab('${t}')" style="${t==='longevity'?'flex:none;padding:10px 6px':''}">${t}</button>`
    ).join('')}
  </div>`;

  // ═══ TODAY TAB ═══
  if(state.tab==='today'){
    h+=`<div class="row" style="gap:4px;margin-bottom:20px;flex-wrap:wrap">
      ${DAYS.map((d,i)=>`<button class="day-btn${state.activeDay===i?' on':''}" style="${state.activeDay===i?`background:${d.color};color:${d.color==='#f59e0b'||d.color==='#8b5cf6'?'#fff':'#000'}`:''}" onclick="setDay(${i})">${d.day}</button>`).join('')}
    </div>`;

    h+=`<div class="spread" style="margin-bottom:4px">
      <span style="font-size:13px;font-weight:700">${day.day}</span>
      <span style="font-size:9px;font-weight:700;color:${day.color};background:${day.color}18;padding:3px 8px;border-radius:4px;letter-spacing:1px">${day.tag}</span>
    </div>
    <div style="font-size:11px;color:${day.color};margin-bottom:16px;font-weight:600">${day.label}</div>`;

    if(day.ex){
      h+=`<div class="alert">\u23F1 Start with 15 min Zone 2 on incline treadmill. HR 131+ BPM. Don't touch a weight until the timer goes off.</div>`;
      day.ex.forEach((ex,ei)=>{
        const last=lastLift(ex.n);
        h+=`<div class="card">
          <div class="spread" style="margin-bottom:4px">
            <div><span style="font-size:13px;font-weight:600">${ex.n}</span>
            <span style="font-size:9px;color:${ex.t==='compound'?'var(--gr)':'var(--dm)'};margin-left:8px;text-transform:uppercase;letter-spacing:1px;font-weight:600">${ex.t}</span></div>
            <span style="font-size:10px;color:var(--dm)">Rest ${ex.rest}</span>
          </div>
          ${last?`<div style="font-size:10px;color:#555;margin-bottom:8px">Last: ${last.w} lb x ${last.r} reps (${last.d})</div>`:''}
          <div class="row" style="margin-bottom:${ex.tr?'8':'0'}px">
            ${Array.from({length:ex.s}).map((_,si)=>{
              const k=`${state.activeDay}-${ei}-${si}`,done=state.checked[k];
              return`<button class="set-btn${done?' done':''}" onclick="toggleSet('${k}')">
                <div style="font-size:9px;color:var(--dm);margin-bottom:2px">SET ${si+1}</div>
                <div style="font-size:12px;font-weight:700;color:${done?'var(--gr)':'var(--tx)'}">${ex.r}</div>
              </button>`;
            }).join('')}
          </div>
          ${ex.tr?`<div class="row8" style="margin-top:8px">
            <input type="number" placeholder="lb" id="lw-${ei}" style="flex:1">
            <input type="number" placeholder="reps" id="lr-${ei}" style="flex:1">
            <button class="btn" onclick="logLift(${ei})">LOG</button>
          </div>`:''}
        </div>`;
      });
    }

    if(day.cardio&&day.opts){
      day.opts.forEach(opt=>{
        h+=`<div class="card" style="padding:16px">
          <div style="font-size:14px;font-weight:700;color:${day.color};margin-bottom:6px">${opt.name}</div>
          <div style="font-size:11px;color:var(--dm2);margin-bottom:${opt.steps?'12':'0'}px;line-height:1.5">${opt.detail}</div>
          ${opt.steps?`<div style="display:flex;flex-direction:column;gap:8px">${opt.steps.map((s,j)=>
            `<div style="display:flex;align-items:flex-start;gap:10px">
              <span style="font-size:10px;font-weight:700;color:${day.color};min-width:20px;text-align:right">${j+1}</span>
              <span style="font-size:12px;color:var(--tx);line-height:1.5">${s}</span>
            </div>`).join('')}</div>`:''}
          ${opt.time?`<div style="margin-top:12px;font-size:10px;color:var(--dm);letter-spacing:1px;text-transform:uppercase">Total: ${opt.time}</div>`:''}
        </div>`;
      });
    }

    if(day.stab&&day.blocks){
      day.blocks.forEach(b=>{
        h+=`<div class="card">
          <div class="spread" style="margin-bottom:10px">
            <span style="font-size:13px;font-weight:700">${b.name}</span>
            <span style="font-size:10px;color:${day.color};font-weight:600">${b.time}</span>
          </div>
          ${b.moves.map((m,j)=>`<div style="display:flex;align-items:center;gap:10px;padding:6px 0;${j>0?'border-top:1px solid #1a1a1a':''}">
            <span style="font-size:10px;color:#555;min-width:16px">${j+1}</span>
            <span style="font-size:12px;color:#ccc;line-height:1.4">${m}</span>
          </div>`).join('')}
        </div>`;
      });
    }
  }

  // ═══ HISTORY TAB ═══
  if(state.tab==='history'){
    const byWk={};state.lifts.forEach(e=>{const w=wkLbl(e.d);if(!byWk[w])byWk[w]=[];byWk[w].push(e)});
    const wks=Object.keys(byWk).reverse();

    if(!wks.length) h+=`<div style="text-align:center;padding:40px 0;color:#444;font-size:12px">No lifts logged yet. Start logging in the Today tab.</div>`;

    wks.forEach(wk=>{
      const entries=byWk[wk],isOpen=state.expWk===wk;
      const byEx={};entries.forEach(e=>{if(!byEx[e.n])byEx[e.n]=[];byEx[e.n].push(e)});
      h+=`<div class="card">
        <button style="background:transparent;border:none;width:100%;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-family:var(--fn);padding:0" onclick="toggleWk('${wk}')">
          <span style="font-size:12px;font-weight:700;color:var(--tx)">${wk}</span>
          <span style="font-size:11px;color:var(--dm)">${isOpen?'\u25B2':'\u25BC'} ${entries.length}</span>
        </button>
        ${isOpen?`<div style="margin-top:12px">${Object.entries(byEx).map(([name,lifts])=>
          `<div style="margin-bottom:12px">
            <div style="font-size:11px;font-weight:700;color:var(--gr);margin-bottom:6px">${name}</div>
            ${lifts.map(l=>`<div class="spread" style="padding:5px 0;border-top:1px solid #1a1a1a">
              <span style="font-size:10px;color:var(--dm2)">${l.d}</span>
              <div style="display:flex;align-items:center;gap:8px">
                <span style="font-size:11px;font-weight:700">${l.w} lb x ${l.r}</span>
                <button class="btn-x" onclick="delL('${l.id}')">&times;</button>
              </div>
            </div>`).join('')}
          </div>`).join('')}</div>`:''}
      </div>`;
    });

    h+=`<div class="row8" style="margin-top:16px">
      <button class="btn-o" style="flex:1" onclick="exportCSV()">EXPORT CSV</button>
      <button class="btn-o" style="flex:1;color:var(--rd);border-color:#331111" onclick="resetAll()">RESET ALL</button>
    </div>`;
  }

  // ═══ RULES TAB ═══
  if(state.tab==='rules'){
    RULES.forEach(r=>{
      h+=`<div class="card" style="display:flex;gap:12px;align-items:flex-start">
        <span style="font-size:20px">${r.i}</span>
        <div><div style="font-size:12px;font-weight:700;margin-bottom:4px">${r.t}</div>
        <div style="font-size:11px;color:var(--dm2);line-height:1.5">${r.d}</div></div>
      </div>`;
    });
  }

  // ═══ NUTRITION TAB ═══
  if(state.tab==='nutrition'){
    NUTR.forEach(n=>{
      h+=`<div class="card" style="display:flex;gap:12px;align-items:center">
        <span style="font-size:20px">${n.i}</span>
        <div style="font-size:12px;color:#ccc;line-height:1.5">${n.r}</div>
      </div>`;
    });
  }

  // ═══ LONGEVITY TAB ═══
  if(state.tab==='longevity'){
    LONG.forEach(l=>{
      h+=`<div class="card">
        <div class="spread" style="margin-bottom:6px">
          <span style="font-size:13px;font-weight:700">${l.p}</span>
          <span style="font-size:11px;font-weight:700;color:${l.c}">${l.s}</span>
        </div>
        <div style="font-size:11px;color:var(--gr);font-weight:600">${l.rx}</div>
      </div>`;
    });
  }

  h+=`<div style="margin-top:30px;padding-top:16px;border-top:1px solid var(--bd);font-size:10px;color:#444;text-align:center;letter-spacing:1px">
    FULL BODY 4x + LONGEVITY \u00B7 NO EXCUSES
  </div>`;

  $('#app').innerHTML=h;
}

// Actions
window.setTab=t=>{state.tab=t;render()};
window.setDay=i=>{state.activeDay=i;render()};
window.toggleWk=w=>{state.expWk=state.expWk===w?null:w;render()};
window.toggleSet=k=>{state.checked[k]=!state.checked[k];render()};

window.logLift=ei=>{
  const day=DAYS[state.activeDay];
  const ex=day.ex[ei];
  const w=parseFloat($(`#lw-${ei}`).value);
  const r=parseInt($(`#lr-${ei}`).value);
  if(!w||!r)return;
  state.lifts.push({d:td(),n:ex.n,w,r,id:uid()});
  save();render();
};

window.delL=id=>{state.lifts=state.lifts.filter(e=>e.id!==id);save();render()};

window.exportCSV=()=>{
  let c="Date,Exercise,Weight (lb),Reps\n";
  state.lifts.forEach(e=>{c+=`${e.d},${e.n},${e.w},${e.r}\n`});
  const b=new Blob([c],{type:'text/csv'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download=`lift-log-${td()}.csv`;a.click();
  URL.revokeObjectURL(u);
};

window.resetAll=()=>{
  if(!confirm('Delete ALL logged data? This cannot be undone.'))return;
  state.lifts=[];save();render();
};

render();
</script>
</body>
</html>
